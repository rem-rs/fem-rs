name: Backend Feature Matrix

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - crates/assembly/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/backend-feature-matrix.yml
      - MFEM_MAPPING.md
      - C1_BACKEND_CONTRACT_FREEZE.md

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: backend-feature-matrix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fem-assembly-reed:
    name: fem-assembly + reed (git dep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REM_RS_SUBMODULES_TOKEN || github.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Test fem-assembly with reed feature (pinned rem-rs/reed from git)
        shell: bash
        run: |
          set -euo pipefail
          cargo test -p fem-assembly --features reed
